<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JenJen & JunJun — Tides of Desire</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+JP:wght@300;400;700&family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --neon:#0da6f2; --neon-pink:#ff2d78; --neon-green:#39ff14;
  --ink:#101c22; --paper:#f5f7f8; --mid:#1e2f38;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--ink);color:#e8ecef;font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden;}
.fd{font-family:'Bebas Neue',cursive;}
.fb{font-family:'Noto Serif JP',serif;}

body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}

.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#screen-reader{overflow-y:auto;max-height:100vh;}

.nt{color:var(--neon);text-shadow:0 0 10px var(--neon),0 0 30px rgba(13,166,242,0.4);}
.rtext{line-height:1.85;letter-spacing:0.025em;font-size:1.08rem;}
.rtext p{color:#dde8ef;margin-bottom:1.7rem;}
.dropcap::first-letter{font-family:'Bebas Neue',cursive;font-size:4.8rem;line-height:0.8;float:left;margin-right:0.15em;margin-top:0.08em;color:#ff2d78;text-shadow:0 0 20px rgba(255,45,120,0.9);}

.shead{position:sticky;top:3px;z-index:50;background:rgba(16,28,34,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(13,166,242,0.1);padding:1rem;}
.back-btn{background:rgba(255,255,255,0.06);border:none;color:#aaa;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:1.1rem;}

.content-wrap{max-width:640px;margin:0 auto;width:100%;padding:1.5rem 1rem 6rem;}
.scene-img{width:100%;border-radius:12px;margin:1.8rem 0;border:1px solid rgba(255,45,120,0.25);box-shadow:0 0 25px rgba(255,45,120,0.15);}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(16,28,34,0.97);backdrop-filter:blur(10px);border-top:1px solid rgba(13,166,242,0.1);padding:0.75rem 1rem 1.25rem;}
.bnav-inner{max-width:400px;margin:0 auto;display:flex;justify-content:space-around;}
.ntab{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;}
.ntab.active,.ntab:hover{color:var(--neon-pink);}
.ntab span.label{font-size:0.6rem;letter-spacing:0.1em;font-weight:700;}
</style>
</head>
<body>

<div id="gbar"></div>

<!-- WELCOME -->
<div id="screen-welcome" class="screen active" style="background:linear-gradient(160deg,#0a1520 0%,#101c22 50%,#0a1015 100%);">
  <div style="text-align:center;margin-top:12vh;padding:1rem;">
    <h1 class="fd nt" style="font-size:3.5rem;letter-spacing:4px;">JENJEN & JUNJUN</h1>
    <p class="fb" style="font-size:1.65rem;margin:1rem 0 3rem;color:var(--neon-pink);">Tides of Desire</p>
    <button onclick="showChapters()" style="background:var(--neon-pink);color:white;padding:1.1rem 2.8rem;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1.15rem;">Begin the Journey</button>
  </div>
</div>

<!-- CHAPTERS -->
<div id="screen-chapters" class="screen">
  <div class="shead"><button class="back-btn" onclick="showWelcome()">←</button> Chapters</div>
  <div class="content-wrap" id="chapter-list"></div>
</div>

<!-- READER -->
<div id="screen-reader" class="screen">
  <div class="shead">
    <button class="back-btn" onclick="showChapters()">←</button>
    <span id="current-chapter-title" class="fd nt" style="margin-left:12px;"></span>
  </div>
  <div class="content-wrap rtext" id="reader-content"></div>
  <div id="cprog" style="height:4px;background:linear-gradient(90deg,#ff2d78,#0da6f2);width:0%;position:fixed;bottom:60px;left:0;"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <div class="bnav-inner">
    <button class="ntab" onclick="showWelcome()"><span class="ico">🏠</span><span class="label">HOME</span></button>
    <button class="ntab active" onclick="showChapters()"><span class="ico">📖</span><span class="label">CHAPTERS</span></button>
  </div>
</div>

<script>
const chapters = [
  {
    id: 1,
    title: "Chapter 1: First Catch",
    content: `
      <p class="dropcap">T</p>
      <p>The golden sunlight danced across the calm waters of Baler as JenJen leaned over the edge of the small fishing boat. Her short dark hair whipped in the sea breeze, and her athletic figure was accentuated by a simple red bikini. JunJun, the tall Swedish man with striking blue eyes and short blonde hair, watched her with barely contained hunger.</p>
      <img src="img/IMG_9606.jpeg" class="scene-img" alt="Fishing boat moment"/>
      <p>They had only been dating a few weeks, but the attraction between them burned like wildfire. When JunJun pulled her into his arms, their lips met in a deep, searing kiss. His strong hands explored her sun-warmed skin as the boat gently rocked beneath them. What started as a romantic fishing trip quickly became something far more passionate — clothes discarded, bodies entwined under the open sky, lost in waves of desire.</p>
    `
  },

    id: 2,

    content: `
      <p class="dropcap">U</p>

      <img src="img/IMG_9607.jpeg" class="scene-img" alt="Bonfire scene"/>
      <p>That night they made love with unrestrained passion — again and again — until the fire burned low and the only heat left was the one between them.</p>
    `
  },
  {
    id: 3,
    title: "Chapter 3: Waterfall Ecstasy",
    content: `
      <p class="dropcap">D</p>
      <p>The following afternoon, they discovered a hidden waterfall deep in the jungle. Beneath the cascading water, JunJun pressed JenJen against the smooth rocks. Their bodies moved in perfect rhythm, the cool water contrasting with the fire of their desire. Every thrust, every kiss, every gasp echoed through the lush surroundings.</p>
      <img src="img/IMG_9606.jpeg" class="scene-img" alt="Waterfall scene"/>
      <p>It was raw, intense, and unforgettable — a moment of pure surrender to each other.</p>
    `
  },
  {
    id: 4,
    title: "Chapter 4: Shadows in the Woods",
    content: `
      <p class="dropcap">T</p>
      <p>On their third night, while walking back through the dense forest, the atmosphere shifted. Howls pierced the darkness. Massive werewolves emerged from the shadows, eyes glowing with primal rage. JunJun fought fiercely to protect JenJen, but one beast slashed him deeply across the chest.</p>
      <img src="img/IMG_9605.jpeg" class="scene-img" alt="Werewolf attack"/>
      <p>As death closed in, they clung to each other. In that desperate moment, their love transcended everything. Their blood mingled, their hearts synchronized — and a transformation began. Fangs extended. Power surged through their veins. They had become vampires, bound by an eternal, passionate bond.</p>

  },

    id: 5,

      <p class="dropcap">B</p>
      <p>Under the crimson Blood Moon, the newly turned vampires unleashed their fury. With superhuman speed and strength, JenJen and JunJun tore through the werewolf pack in a breathtaking display of power and coordination.</p>
      <img src="img/IMG_9604.jpeg" class="scene-img" alt="Final battle"/>
      <p>After defeating the Alpha, they stood victorious, covered in blood and adrenaline. Their eyes met, and the passion that had saved them ignited once more. In the aftermath of battle, they claimed each other completely — a fierce, eternal union under the watchful moon.</p>

  },{

    content: `
      <p class="dropcap">A</p>
      <p>In the aftermath of the blood moon battle, JenJen and JunJun — now eternal vampires with glowing crimson eyes — encountered two unlikely allies. <strong>Vesper</strong>, a graceful centuries-old vampire with silver hair, and <strong>Kai</strong>, a young, energetic turned vampire with a mischievous grin.</p>
      <img src="img/IMG_9623.jpeg" class="scene-img" alt="Meeting vampire allies"/>
      <p>“You two reek of fresh power,” Vesper said with a knowing smile. “The old bloodlines are stirring. Something dark is coming.”</p>
    `
  },
  {
    id: 7,
    title: "Chapter 7: Eternal Craving",
    content: `
      <p class="dropcap">T</p>
      <p>Hidden in an abandoned cliffside villa, JenJen and JunJun gave in to their heightened vampire senses. Their lovemaking was no longer human — it was primal, intense, and endless. Naked under the moonlight, their pale skin glowed as they explored every inch of each other with fangs grazing sensitive flesh.</p>
      <img src="img/IMG_9621.jpeg" class="scene-img" alt="Spicy vampire love scene"/>
      <p>JunJun pinned her against the wall, thrusting deep while their bloodlust mixed with raw passion. JenJen’s moans echoed through the night as they reached climax after climax, their bodies moving in perfect, superhuman harmony.</p>
    `
  },
  {
    id: 8,
    title: "Chapter 8: The Mad Hunter",
    content: `
      <p class="dropcap">F</p>
      <p>A new threat emerged — <strong>Dr. Lazarus</strong>, a brilliant but completely insane human hunter obsessed with capturing vampires. With advanced weapons and a deranged laugh, he ambushed them with a squad of elite mercenaries.</p>
      <img src="img/IMG_9625.jpeg" class="scene-img" alt="Crazy mad hunter"/>

  {
    id: 9,

    content: `
      <p class="dropcap">T</p>
      <p>The true enemy revealed itself: <strong>Lord Vorath</strong>, an ancient and mighty vampire lord who sought to rule all supernatural beings. A brutal battle erupted in the ruins of an old fortress.</p>
      <img src="img/IMG_9621.jpeg" class="scene-img" alt="Epic battle against Lord Vorath"/>
      <p>JenJen and JunJun fought side by side with Vesper and Kai, their love-fueled power making them unstoppable.</p>
    `
  },
  {
    id: 10,
    title: "Chapter 10: Eternal Eclipse",
    content: `
      <p class="dropcap">I</p>
      <p>In the final confrontation, after defeating Vorath’s forces, JenJen and JunJun sealed their bond once more in a passionate, blood-soaked embrace atop the ruins. Their love had turned them into legends.</p>
      <img src="img/IMG_9616.jpeg" class="scene-img" alt="Final passionate victory"/>
      <p>With new friends by their side, they stepped into eternity — stronger, hungrier, and forever together.</p>

];

function showWelcome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-welcome').classList.add('active');
}

function showChapters() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-chapters').classList.add('active');
  const list = document.getElementById('chapter-list');
  list.innerHTML = chapters.map(ch => `
    <div onclick="openChapter(${ch.id})" style="padding:1.4rem 1rem;margin-bottom:1rem;background:rgba(255,45,120,0.08);border-radius:12px;border:1px solid rgba(255,45,120,0.2);cursor:pointer;">
      <strong class="nt">${ch.title}</strong>
    </div>
  `).join('');
}

function openChapter(id) {
  const ch = chapters.find(c => c.id === id);
  document.getElementById('current-chapter-title').textContent = ch.title;
  document.getElementById('reader-content').innerHTML = ch.content;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-reader').classList.add('active');

  let progress = 0;
  const prog = document.getElementById('cprog');
  const interval = setInterval(() => {
    progress += 10;
    if (progress >= 100) { progress = 100; clearInterval(interval); }
    prog.style.width = progress + '%';
  }, 200);
}
</script>
</body>
</html>
